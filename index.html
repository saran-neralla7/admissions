<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/gvpcdpgc-logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- PWA Settings -->
    <meta name="theme-color" content="#0b57d0" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="GVP Admissions" />
    <link rel="apple-touch-icon" href="/gvpcdpgc-logo.png" />
    <script>
      (function() {
        const isAdmin = window.location.pathname.startsWith('/gvpadmin');
        const link = document.createElement('link');
        link.rel = 'manifest';
        link.id = 'pwa-manifest';
        link.href = isAdmin ? '/admin-manifest.json' : '/manifest.json';
        document.head.appendChild(link);
        
        if (isAdmin) {
          document.title = "GVP Admissions Admin Portal";
          const appleTitle = document.querySelector('meta[name="apple-mobile-web-app-title"]');
          if (appleTitle) appleTitle.setAttribute('content', 'GVP Admin');
        }
      })();
    </script>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <title>Student Admission Data Collection Portal | GVPCDPGC</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      // Register custom service worker for PWA based on route scope
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          const isAdmin = window.location.pathname.startsWith('/gvpadmin');
          const swPath = isAdmin ? '/sw-admin.js' : '/sw.js';
          const options = isAdmin ? { scope: '/gvpadmin' } : { scope: '/' };
          
          navigator.serviceWorker.register(swPath, options)
            .then(reg => console.log('Service Worker registered successfully:', reg.scope))
            .catch(err => console.log('Service Worker registration failed:', err));
        });
      }
    </script>
  </body>
</html>
